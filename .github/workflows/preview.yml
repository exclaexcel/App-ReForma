name: Vercel Preview Deployment

# IMPORTANT: VERCEL_PROJECT_ID must be set to the Project ID of the
# "appreforma" project in Vercel, NOT "appchacasanova" or any other project.
# To find the correct ID: Vercel Dashboard → appreforma project → Settings → General → Project ID

on:
  push:
    branches:
      - main
      - claude/fix-deployment-url-HnX8f

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment target
        run: |
          echo "========================================"
          echo "Deployment target audit"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Org ID (first 8 chars): ${VERCEL_ORG_ID:0:8}..."
          echo "Project ID (first 8 chars): ${VERCEL_PROJECT_ID:0:8}..."
          echo "Expected project: appreforma (exclaexcel-appreforma.vercel.app)"
          echo "========================================"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on commit
        if: github.ref_name != 'main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `Preview deployed to: ${{ steps.deploy.outputs.preview_url }}`
            })
